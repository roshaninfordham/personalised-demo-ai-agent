[project]
name = "live-demo-backend-common"
version = "0.1.0"
description = "Shared backend utilities for the live demo agent platform."
requires-python = ">=3.12,<3.14"
dependencies = [
  "live-demo-policies>=0.1.0",
  "httpx>=0.27.0",
  "pydantic>=2.8.0",
  "pydantic-settings>=2.4.0",
  "tenacity>=9.0.0",
]

[project.optional-dependencies]
test = [
  "pytest>=8.3.0",
  "pytest-asyncio>=0.24.0",
  "respx>=0.21.0",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"
