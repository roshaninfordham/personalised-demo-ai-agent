name: live-demo-agent

services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: demo_agent
      POSTGRES_USER: demo_agent
      POSTGRES_PASSWORD: demo_agent
    ports:
      - "${HOST_POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U demo_agent -d demo_agent"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped
    networks:
      - live-demo-agent

  redis:
    image: redis:7-alpine
    ports:
      - "${HOST_REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    command: ["redis-server", "--appendonly", "yes"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped
    networks:
      - live-demo-agent

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "${HOST_MINIO_API_PORT:-9000}:9000"
      - "${HOST_MINIO_CONSOLE_PORT:-9001}:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 10
    restart: unless-stopped
    networks:
      - live-demo-agent

  db-migrate:
    build:
      context: .
      dockerfile: infra/docker/api.Dockerfile
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://demo_agent:demo_agent@postgres:5432/demo_agent
      DATABASE_SYNC_URL: postgresql+psycopg://demo_agent:demo_agent@postgres:5432/demo_agent
      REDIS_URL: redis://redis:6379/0
      OBJECT_STORAGE_ENDPOINT: http://minio:9000
      AI_TEXT_PROVIDER: ${AI_TEXT_PROVIDER:-fake}
      AI_STT_PROVIDER: ${AI_STT_PROVIDER:-fake}
      AI_TTS_PROVIDER: ${AI_TTS_PROVIDER:-fake}
    command:
      [
        "/bin/sh",
        "-c",
        "cd /app/services/api && /app/.venv/bin/alembic upgrade head",
      ]
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - live-demo-agent

  api:
    build:
      context: .
      dockerfile: infra/docker/api.Dockerfile
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://demo_agent:demo_agent@postgres:5432/demo_agent
      DATABASE_SYNC_URL: postgresql+psycopg://demo_agent:demo_agent@postgres:5432/demo_agent
      REDIS_URL: redis://redis:6379/0
      OBJECT_STORAGE_ENDPOINT: http://minio:9000
      CORS_ALLOWED_ORIGINS: ${PUBLIC_BASE_URL:-http://localhost:3000}
      AI_TEXT_PROVIDER: ${AI_TEXT_PROVIDER:-fake}
      AI_STT_PROVIDER: ${AI_STT_PROVIDER:-fake}
      AI_TTS_PROVIDER: ${AI_TTS_PROVIDER:-fake}
      LEARNER_ENABLED: ${LEARNER_ENABLED:-true}
    ports:
      - "${HOST_API_PORT:-8000}:8000"
    depends_on:
      postgres:
        condition: service_healthy
      db-migrate:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
      browser-runtime:
        condition: service_healthy
      agent-runtime:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/healthz"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - live-demo-agent

  web:
    build:
      context: .
      dockerfile: infra/docker/web.Dockerfile
      args:
        NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-http://localhost:8000}
        NEXT_PUBLIC_EVENTS_BASE_URL: ${NEXT_PUBLIC_EVENTS_BASE_URL:-http://localhost:8000}
        NEXT_PUBLIC_BROWSER_RUNTIME_URL: ${NEXT_PUBLIC_BROWSER_RUNTIME_URL:-http://localhost:8200}
        NEXT_PUBLIC_AGENT_RUNTIME_URL: ${NEXT_PUBLIC_AGENT_RUNTIME_URL:-http://localhost:8300}
        NEXT_PUBLIC_MINIO_URL: ${NEXT_PUBLIC_MINIO_URL:-http://localhost:9000}
        NEXT_PUBLIC_GRAFANA_URL: ${NEXT_PUBLIC_GRAFANA_URL:-http://localhost:3001}
        NEXT_PUBLIC_PROMETHEUS_URL: ${NEXT_PUBLIC_PROMETHEUS_URL:-http://localhost:9090}
        NEXT_PUBLIC_JAEGER_URL: ${NEXT_PUBLIC_JAEGER_URL:-http://localhost:16686}
        NEXT_PUBLIC_LOKI_URL: ${NEXT_PUBLIC_LOKI_URL:-http://localhost:3100}
        NEXT_PUBLIC_PROVIDER_MODE_LABEL: ${NEXT_PUBLIC_PROVIDER_MODE_LABEL:-Fake Providers}
    environment:
      APP_ENV: local
      PUBLIC_BASE_URL: ${PUBLIC_BASE_URL:-http://localhost:3000}
      API_BASE_URL: http://api:8000
      NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-http://localhost:8000}
      NEXT_PUBLIC_EVENTS_BASE_URL: ${NEXT_PUBLIC_EVENTS_BASE_URL:-http://localhost:8000}
      NEXT_PUBLIC_BROWSER_RUNTIME_URL: ${NEXT_PUBLIC_BROWSER_RUNTIME_URL:-http://localhost:8200}
      NEXT_PUBLIC_AGENT_RUNTIME_URL: ${NEXT_PUBLIC_AGENT_RUNTIME_URL:-http://localhost:8300}
      NEXT_PUBLIC_MINIO_URL: ${NEXT_PUBLIC_MINIO_URL:-http://localhost:9000}
      NEXT_PUBLIC_GRAFANA_URL: ${NEXT_PUBLIC_GRAFANA_URL:-http://localhost:3001}
      NEXT_PUBLIC_PROMETHEUS_URL: ${NEXT_PUBLIC_PROMETHEUS_URL:-http://localhost:9090}
      NEXT_PUBLIC_JAEGER_URL: ${NEXT_PUBLIC_JAEGER_URL:-http://localhost:16686}
      NEXT_PUBLIC_LOKI_URL: ${NEXT_PUBLIC_LOKI_URL:-http://localhost:3100}
      NEXT_PUBLIC_PROVIDER_MODE_LABEL: ${NEXT_PUBLIC_PROVIDER_MODE_LABEL:-Fake Providers}
    ports:
      - "${HOST_WEB_PORT:-3000}:3000"
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://localhost:3000').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))",
        ]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - live-demo-agent

  agent-runtime:
    build:
      context: .
      dockerfile: infra/docker/agent-runtime.Dockerfile
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://demo_agent:demo_agent@postgres:5432/demo_agent
      REDIS_URL: redis://redis:6379/0
      AI_TEXT_PROVIDER: ${AI_TEXT_PROVIDER:-fake}
      AI_STT_PROVIDER: ${AI_STT_PROVIDER:-fake}
      AI_TTS_PROVIDER: ${AI_TTS_PROVIDER:-fake}
    ports:
      - "${HOST_AGENT_RUNTIME_PORT:-8300}:8300"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    security_opt:
      - no-new-privileges:true
    healthcheck:
      test:
        [
          "CMD",
          "/app/.venv/bin/python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://localhost:8300/healthz', timeout=2).read()",
        ]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - live-demo-agent

  browser-runtime:
    build:
      context: .
      dockerfile: infra/docker/browser-runtime.Dockerfile
    env_file: .env
    environment:
      REDIS_URL: redis://redis:6379/0
      OBJECT_STORAGE_ENDPOINT: http://minio:9000
      BROWSER_MAX_CONCURRENT_SESSIONS: ${BROWSER_MAX_CONCURRENT_SESSIONS:-3}
    ports:
      - "${HOST_BROWSER_RUNTIME_PORT:-8200}:8200"
    shm_size: "2gb"
    depends_on:
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    security_opt:
      - no-new-privileges:true
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://localhost:8200/healthz').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))",
        ]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - live-demo-agent

  learner-worker:
    build:
      context: .
      dockerfile: infra/docker/learner-worker.Dockerfile
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://demo_agent:demo_agent@postgres:5432/demo_agent
      DATABASE_SYNC_URL: postgresql+psycopg://demo_agent:demo_agent@postgres:5432/demo_agent
      REDIS_URL: redis://redis:6379/0
      OBJECT_STORAGE_ENDPOINT: http://minio:9000
      AI_TEXT_PROVIDER: ${AI_TEXT_PROVIDER:-fake}
      LEARNER_ENABLED: ${LEARNER_ENABLED:-true}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      api:
        condition: service_healthy
      browser-runtime:
        condition: service_healthy
    security_opt:
      - no-new-privileges:true
    healthcheck:
      test:
        [
          "CMD",
          "/app/.venv/bin/python",
          "-c",
          "from live_demo_learner_worker.health import health_check; raise SystemExit(0 if health_check()['status'] == 'ok' else 1)",
        ]
      interval: 30s
      timeout: 5s
      retries: 5
    networks:
      - live-demo-agent

  learner-worker-scrapegraph:
    profiles: ["scrapegraph"]
    build:
      context: .
      dockerfile: infra/docker/learner-worker.Dockerfile
      args:
        UV_EXTRA_ARGS: "--group scrapegraph --extra scrapegraph"
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://demo_agent:demo_agent@postgres:5432/demo_agent
      DATABASE_SYNC_URL: postgresql+psycopg://demo_agent:demo_agent@postgres:5432/demo_agent
      REDIS_URL: redis://redis:6379/0
      OBJECT_STORAGE_ENDPOINT: http://minio:9000
      SCRAPEGRAPH_ENABLED: "true"
      SCRAPEGRAPH_TELEMETRY_ENABLED: "false"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      api:
        condition: service_healthy
      browser-runtime:
        condition: service_healthy
    security_opt:
      - no-new-privileges:true
    healthcheck:
      test:
        [
          "CMD",
          "/app/.venv/bin/python",
          "-c",
          "from live_demo_learner_worker.health import health_check; raise SystemExit(0 if health_check()['status'] == 'ok' else 1)",
        ]
      interval: 30s
      timeout: 5s
      retries: 5
    networks:
      - live-demo-agent

  post-demo-worker:
    build:
      context: .
      dockerfile: infra/docker/post-demo-worker.Dockerfile
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://demo_agent:demo_agent@postgres:5432/demo_agent
      DATABASE_SYNC_URL: postgresql+psycopg://demo_agent:demo_agent@postgres:5432/demo_agent
      REDIS_URL: redis://redis:6379/0
      OBJECT_STORAGE_ENDPOINT: http://minio:9000
      AI_TEXT_PROVIDER: ${AI_TEXT_PROVIDER:-fake}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      api:
        condition: service_healthy
    security_opt:
      - no-new-privileges:true
    networks:
      - live-demo-agent

  tts-service:
    profiles: ["tts-local"]
    build:
      context: .
      dockerfile: infra/docker/tts-service.Dockerfile
    env_file: .env
    ports:
      - "${HOST_TTS_PORT:-8100}:8100"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8100/healthz"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - live-demo-agent

  ollama:
    profiles: ["ai-local"]
    image: ollama/ollama:latest
    ports:
      - "${HOST_OLLAMA_PORT:-11434}:11434"
    volumes:
      - ollama_data:/root/.ollama
    restart: unless-stopped
    networks:
      - live-demo-agent

  otel-collector:
    profiles: ["observability"]
    image: otel/opentelemetry-collector-contrib:latest
    command: ["--config=/etc/otel-collector.yaml"]
    volumes:
      - ./infra/observability/otel-collector.yaml:/etc/otel-collector.yaml:ro
    ports:
      - "${HOST_OTEL_GRPC_PORT:-4317}:4317"
      - "${HOST_OTEL_HTTP_PORT:-4318}:4318"
    restart: unless-stopped
    networks:
      - live-demo-agent

  prometheus:
    profiles: ["observability"]
    image: prom/prometheus:latest
    volumes:
      - ./infra/observability/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    ports:
      - "${HOST_PROMETHEUS_PORT:-9090}:9090"
    restart: unless-stopped
    networks:
      - live-demo-agent

  grafana:
    profiles: ["observability"]
    image: grafana/grafana:latest
    ports:
      - "${HOST_GRAFANA_PORT:-3001}:3000"
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-admin}
    volumes:
      - grafana_data:/var/lib/grafana
      - ./infra/observability/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./infra/observability/grafana/dashboards:/var/lib/grafana/dashboards:ro
    restart: unless-stopped
    networks:
      - live-demo-agent

  loki:
    profiles: ["observability"]
    image: grafana/loki:latest
    ports:
      - "${HOST_LOKI_PORT:-3100}:3100"
    volumes:
      - ./infra/observability/loki-config.yaml:/etc/loki/local-config.yaml:ro
    restart: unless-stopped
    networks:
      - live-demo-agent

  jaeger:
    profiles: ["observability"]
    image: jaegertracing/all-in-one:latest
    environment:
      COLLECTOR_OTLP_ENABLED: "true"
    ports:
      - "${HOST_JAEGER_UI_PORT:-16686}:16686"
      - "${HOST_JAEGER_COLLECTOR_PORT:-14268}:14268"
    restart: unless-stopped
    networks:
      - live-demo-agent

volumes:
  postgres_data:
  redis_data:
  minio_data:
  ollama_data:
  grafana_data:

networks:
  live-demo-agent:
    driver: bridge
