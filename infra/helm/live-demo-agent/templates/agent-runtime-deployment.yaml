apiVersion: apps/v1
kind: Deployment
metadata:
  name: agent-runtime
spec:
  replicas: {{ .Values.replicaCounts.agentRuntime }}
  selector:
    matchLabels:
      app.kubernetes.io/name: agent-runtime
  template:
    metadata:
      labels:
        app.kubernetes.io/name: agent-runtime
    spec:
      terminationGracePeriodSeconds: 30
      securityContext:
        runAsNonRoot: true
        runAsUser: {{ .Values.securityContext.runAsUser }}
        runAsGroup: {{ .Values.securityContext.runAsGroup }}
        fsGroup: {{ .Values.securityContext.fsGroup }}
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: agent-runtime
          image: "{{ .Values.image.registry }}/agent-runtime:{{ .Values.image.tag }}"
          securityContext:
{{ include "live-demo-agent.containerSecurityContext" . | indent 12 }}
          resources:
            requests:
              cpu: 500m
              memory: 1Gi
            limits:
              cpu: "2"
              memory: 2Gi
