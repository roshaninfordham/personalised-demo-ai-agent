apiVersion: apps/v1
kind: Deployment
metadata:
  name: api
  labels:
    app.kubernetes.io/name: api
{{ include "live-demo-agent.labels" . | indent 4 }}
spec:
  replicas: {{ .Values.replicaCounts.api }}
  selector:
    matchLabels:
      app.kubernetes.io/name: api
  template:
    metadata:
      labels:
        app.kubernetes.io/name: api
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: {{ .Values.securityContext.runAsUser }}
        runAsGroup: {{ .Values.securityContext.runAsGroup }}
        fsGroup: {{ .Values.securityContext.fsGroup }}
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: api
          image: "{{ .Values.image.registry }}/api:{{ .Values.image.tag }}"
          ports:
            - name: http
              containerPort: 8000
          envFrom:
            - configMapRef:
                name: live-demo-agent-config
            - secretRef:
                name: {{ .Values.secrets.existingSecret }}
          resources:
{{ toYaml .Values.resources.api | indent 12 }}
          securityContext:
{{ include "live-demo-agent.containerSecurityContext" . | indent 12 }}
          volumeMounts:
            - name: tmp
              mountPath: /tmp
          readinessProbe:
            httpGet:
              path: /readyz
              port: http
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
      volumes:
        - name: tmp
          emptyDir: {}
