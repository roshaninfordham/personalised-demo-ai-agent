apiVersion: apps/v1
kind: Deployment
metadata:
  name: tts-service
  labels:
    app.kubernetes.io/name: tts-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: tts-service
  template:
    metadata:
      labels:
        app.kubernetes.io/name: tts-service
    spec:
      serviceAccountName: live-demo-agent
      automountServiceAccountToken: false
      securityContext:
        runAsNonRoot: true
        runAsUser: 10001
        runAsGroup: 10001
        fsGroup: 10001
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: tts-service
          image: live-demo-agent/tts-service:latest
          ports:
            - containerPort: 8100
              name: http
          envFrom:
            - configMapRef:
                name: live-demo-agent-config
            - secretRef:
                name: live-demo-agent-secrets
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: "1"
              memory: 1Gi
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          volumeMounts:
            - name: tmp
              mountPath: /tmp
            - name: cache
              mountPath: /app/.cache
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
      volumes:
        - name: tmp
          emptyDir: {}
        - name: cache
          emptyDir: {}
