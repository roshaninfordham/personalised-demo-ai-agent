apiVersion: apps/v1
kind: Deployment
metadata:
  name: jaeger
  labels:
    app.kubernetes.io/name: jaeger
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: jaeger
  template:
    metadata:
      labels:
        app.kubernetes.io/name: jaeger
    spec:
      serviceAccountName: live-demo-agent
      automountServiceAccountToken: false
      containers:
        - name: jaeger
          image: jaegertracing/all-in-one:1.65.0
          ports:
            - containerPort: 16686
              name: http
            - containerPort: 4317
              name: otlp-grpc
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: false
            capabilities:
              drop: ["ALL"]
---
apiVersion: v1
kind: Service
metadata:
  name: jaeger
  labels:
    app.kubernetes.io/name: jaeger
spec:
  selector:
    app.kubernetes.io/name: jaeger
  ports:
    - name: http
      port: 16686
      targetPort: http
    - name: otlp-grpc
      port: 4317
      targetPort: otlp-grpc
