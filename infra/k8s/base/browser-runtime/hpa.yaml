apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: browser-runtime
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: browser-runtime
  minReplicas: 2
  maxReplicas: 15
  metrics:
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 70
    - type: Pods
      pods:
        metric:
          name: live_demo_browser_sessions_active_current
        target:
          type: AverageValue
          averageValue: "2"
  behavior:
    scaleDown:
      stabilizationWindowSeconds: 300
    scaleUp:
      stabilizationWindowSeconds: 30
