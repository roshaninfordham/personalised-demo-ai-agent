apiVersion: apps/v1
kind: Deployment
metadata:
  name: browser-runtime
  labels:
    app.kubernetes.io/name: browser-runtime
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: browser-runtime
  template:
    metadata:
      labels:
        app.kubernetes.io/name: browser-runtime
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8200"
    spec:
      serviceAccountName: live-demo-agent
      automountServiceAccountToken: false
      terminationGracePeriodSeconds: 30
      securityContext:
        runAsNonRoot: true
        runAsUser: 10001
        runAsGroup: 10001
        fsGroup: 10001
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: browser-runtime
          image: live-demo-agent/browser-runtime:latest
          ports:
            - containerPort: 8200
              name: http
          envFrom:
            - configMapRef:
                name: live-demo-agent-config
            - secretRef:
                name: live-demo-agent-secrets
          env:
            - name: BROWSER_MAX_CONCURRENT_SESSIONS
              value: "3"
            - name: PLAYWRIGHT_BROWSERS_PATH
              value: /ms-playwright
          lifecycle:
            preStop:
              exec:
                command: ["/bin/sh", "-c", "sleep 10"]
          resources:
            requests:
              cpu: "1"
              memory: 2Gi
            limits:
              cpu: "4"
              memory: 4Gi
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          volumeMounts:
            - name: tmp
              mountPath: /tmp
            - name: browser-cache
              mountPath: /app/.cache
            - name: dshm
              mountPath: /dev/shm
          readinessProbe:
            httpGet:
              path: /readyz
              port: http
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
          startupProbe:
            httpGet:
              path: /healthz
              port: http
            failureThreshold: 60
            periodSeconds: 2
      volumes:
        - name: tmp
          emptyDir: {}
        - name: browser-cache
          emptyDir: {}
        - name: dshm
          emptyDir:
            medium: Memory
            sizeLimit: 1Gi
