apiVersion: apps/v1
kind: Deployment
metadata:
  name: post-demo-worker
  labels:
    app.kubernetes.io/name: post-demo-worker
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: post-demo-worker
  template:
    metadata:
      labels:
        app.kubernetes.io/name: post-demo-worker
    spec:
      serviceAccountName: live-demo-agent
      automountServiceAccountToken: false
      terminationGracePeriodSeconds: 30
      securityContext:
        runAsNonRoot: true
        runAsUser: 10001
        runAsGroup: 10001
        fsGroup: 10001
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: post-demo-worker
          image: live-demo-agent/post-demo-worker:latest
          envFrom:
            - configMapRef:
                name: live-demo-agent-config
            - secretRef:
                name: live-demo-agent-secrets
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: "1"
              memory: 1Gi
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          volumeMounts:
            - name: tmp
              mountPath: /tmp
            - name: cache
              mountPath: /app/.cache
          readinessProbe:
            exec:
              command: ["/app/.venv/bin/python", "-c", "import live_demo_api; raise SystemExit(0)"]
          livenessProbe:
            exec:
              command: ["/app/.venv/bin/python", "-c", "import live_demo_api; raise SystemExit(0)"]
      volumes:
        - name: tmp
          emptyDir: {}
        - name: cache
          emptyDir: {}
