apiVersion: batch/v1
kind: Job
metadata:
  name: db-migrate
  labels:
    app.kubernetes.io/name: db-migrate
spec:
  backoffLimit: 1
  template:
    metadata:
      labels:
        app.kubernetes.io/name: db-migrate
    spec:
      restartPolicy: Never
      serviceAccountName: live-demo-agent
      automountServiceAccountToken: false
      securityContext:
        runAsNonRoot: true
        runAsUser: 10001
        runAsGroup: 10001
        fsGroup: 10001
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: db-migrate
          image: live-demo-agent/api:latest
          command: ["/app/.venv/bin/alembic", "-c", "services/api/alembic.ini", "upgrade", "head"]
          envFrom:
            - configMapRef:
                name: live-demo-agent-config
            - secretRef:
                name: live-demo-agent-secrets
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: "1"
              memory: 1Gi
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          volumeMounts:
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: tmp
          emptyDir: {}
