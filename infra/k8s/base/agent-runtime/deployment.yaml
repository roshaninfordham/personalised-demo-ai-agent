apiVersion: apps/v1
kind: Deployment
metadata:
  name: agent-runtime
  labels:
    app.kubernetes.io/name: agent-runtime
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: agent-runtime
  template:
    metadata:
      labels:
        app.kubernetes.io/name: agent-runtime
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8300"
    spec:
      serviceAccountName: live-demo-agent
      automountServiceAccountToken: false
      terminationGracePeriodSeconds: 30
      securityContext:
        runAsNonRoot: true
        runAsUser: 10001
        runAsGroup: 10001
        fsGroup: 10001
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: agent-runtime
          image: live-demo-agent/agent-runtime:latest
          ports:
            - containerPort: 8300
              name: http
          envFrom:
            - configMapRef:
                name: live-demo-agent-config
            - secretRef:
                name: live-demo-agent-secrets
          lifecycle:
            preStop:
              exec:
                command: ["/bin/sh", "-c", "sleep 10"]
          resources:
            requests:
              cpu: 500m
              memory: 1Gi
            limits:
              cpu: "2"
              memory: 2Gi
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          volumeMounts:
            - name: tmp
              mountPath: /tmp
            - name: cache
              mountPath: /app/.cache
          readinessProbe:
            httpGet:
              path: /readyz
              port: http
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
          startupProbe:
            httpGet:
              path: /healthz
              port: http
            failureThreshold: 45
            periodSeconds: 2
      volumes:
        - name: tmp
          emptyDir: {}
        - name: cache
          emptyDir: {}
