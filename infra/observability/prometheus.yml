global:
  scrape_interval: 15s

scrape_configs:
  - job_name: "otel-collector"
    static_configs:
      - targets: ["otel-collector:9464"]
  - job_name: "api"
    metrics_path: /metrics
    static_configs:
      - targets: ["api:8000"]
  - job_name: "agent-runtime"
    metrics_path: /metrics
    static_configs:
      - targets: ["agent-runtime:8300"]
  - job_name: "browser-runtime"
    metrics_path: /metrics
    static_configs:
      - targets: ["browser-runtime:8200"]
