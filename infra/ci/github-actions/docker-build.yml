name: Docker Build

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  docker-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: cp .env.example .env
      - run: make docker-build-all
      - run: scripts/security/verify_container_user.sh
      - run: scripts/security/verify_no_env_in_images.sh
