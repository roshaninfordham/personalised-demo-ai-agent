name: Security Scan

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
      - run: cp .env.example .env
      - run: uv sync --all-packages
      - run: make security-scan
      - run: make k8s-validate
